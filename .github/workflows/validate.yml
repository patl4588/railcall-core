name: Validate Code and Pins

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Check for Conflict Markers
      run: |
        if grep -r -E "<<<<<<<|=======|>>>>>>>" --include="*.py" .; then
          echo "Error: Unresolved conflict markers found in Python files!"
          exit 1
        fi
        echo "No conflict markers found."

    - name: Syntax Check (Python Compile)
      run: |
        python -m compileall -q .
        echo "Syntax check passed."

    - name: Validate SHA pins
      run: |
        fail=0
        for f in railcall_cli.py railcall_companion_daemon.py vault_io.py receipt_signer.py; do
          actual=$(shasum -a 256 "$f" | awk '{print $1}')
          pinned=$(grep "$f)" install.sh | grep -oE '[a-f0-9]{64}')
          if [ "$actual" != "$pinned" ]; then
            echo "FAIL: $f pin mismatch (pinned=$pinned, actual=$actual)"
            fail=1
          fi
        done
        exit $fail
