<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'none';
                 style-src {{NONCE}} 'unsafe-inline' {{CSS_URI}};
                 script-src 'nonce-{{NONCE}}' {{JS_URI}};
                 img-src data:;"/>
  <link rel="stylesheet" href="{{CSS_URI}}" nonce="{{NONCE}}"/>
  <title>RailCall AI</title>
</head>
<body>
  <div id="header">
    <span id="logo">◆ RAILCALL</span>
    <span id="server-dot" title="Checking server…"></span>
    <button id="clear-btn" title="Clear conversation">↺</button>
  </div>

  <div id="messages" role="log" aria-live="polite">
    <div class="msg assistant">
      <div class="bubble">
        RailCall AI is ready. Ask anything about your code, or right-click a selection for Explain / Fix / Refactor.
      </div>
    </div>
  </div>

  <div id="thinking-bar" hidden>
    <span class="dot"></span><span class="dot"></span><span class="dot"></span>
    <span class="thinking-label">thinking…</span>
  </div>

  <div id="input-area">
    <textarea id="input" placeholder="Ask about your code… (Enter to send, Shift+Enter for newline)" rows="3"></textarea>
    <div id="input-row">
      <span id="ctx-hint"></span>
      <button id="send-btn">Send ↵</button>
    </div>
  </div>

  <script nonce="{{NONCE}}" src="{{JS_URI}}"></script>
</body>
</html>
