# Render Blueprint for the Railcall public gateway.
# Deploys ONLY the public surface: landing (/), checkout, and the Stripe webhook.
# Admin routes (/admin, /api/keys, /api/dashboard_data) stay 404 here because
# RAILCALL_LOCAL_ADMIN is NOT set on Render — they only work on your local machine.
services:
  - type: web
    name: railcall-gateway
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python cloud_gateway.py
    envVars:
      # Set these in the Render dashboard (sync:false = never stored in the repo).
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      # Your public service URL, e.g. https://railcall-gateway.onrender.com
      # Used for Stripe checkout success/cancel redirects.
      - key: DOMAIN_URL
        sync: false
      # NOTE: do NOT add RAILCALL_LOCAL_ADMIN here — leaving it unset keeps the
      # admin/keys/dashboard routes disabled (404) on the public internet.
