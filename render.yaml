# Render Blueprint for the Railcall public gateway.
# Public surface only: landing (/), checkout, Stripe webhook. Admin routes
# (/admin, /api/keys, /api/dashboard_data) stay 404 here because RAILCALL_LOCAL_ADMIN
# is NOT set on Render — they only work on your local machine.
#
# Storage: a managed Postgres DB (durable). The app falls back to SQLite only when
# DATABASE_URL is absent (i.e. local dev) — never on Render.
databases:
  - name: railcall-db
    plan: free

services:
  - type: web
    name: railcall-core
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python cloud_gateway.py
    envVars:
      # Durable Postgres — auto-wired from the database above.
      - key: DATABASE_URL
        fromDatabase:
          name: railcall-db
          property: connectionString
      # Set these in the Render dashboard (sync:false = never stored in the repo).
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      # Your public service URL, e.g. https://railcall-core.onrender.com
      - key: DOMAIN_URL
        sync: false
      # LICENSING AUTHORITY private seed (64 hex chars). Set in the dashboard only —
      # sync:false keeps it out of the repo. It MUST be the seed matching the pubkey
      # pinned in the shipped station (entitlement.py ISSUER_PUBKEY_HEX), or every
      # station will refuse every entitlement this server mints. Treat it as a root
      # key: generate once, back up offline, rotating invalidates all outstanding
      # entitlements. While unset, /v1/entitlement/* and /v1/issuer/pubkey 503
      # honestly rather than degrading to something insecure.
      - key: RAILCALL_ISSUER_SEED
        sync: false
      # NOTE: do NOT add RAILCALL_LOCAL_ADMIN here — leaving it unset keeps the
      # admin/keys/dashboard routes disabled (404) on the public internet.

  # ── Discord support bot (background worker) ────────────────────────────────
  # Stateless + redeploy-safe (the bot traps SIGTERM and logs out cleanly). This service is NOT
  # created on push — you must sync this Blueprint in the Render dashboard AND set the two secrets
  # below, so it can never crash-loop empty. Adding it here does not touch the gateway web service.
  - type: worker
    name: railcall-discord-bot
    runtime: docker
    plan: free
    dockerfilePath: ./bot/Dockerfile
    dockerContext: ./bot
    envVars:
      - key: DISCORD_BOT_TOKEN     # discord.com/developers → your bot → Reset Token
        sync: false
      - key: GROQ_API_KEY          # your existing Groq key — powers the support cascade
        sync: false
      - key: ESCALATE_MENTION      # optional: "<@your_discord_user_id>" — pinged on billing/refund/account
        sync: false
