<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="color-scheme" content="light">
<meta name="robots" content="noindex,nofollow">
<title>RailCall — Admin</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#f4f5f7;color:#1f2937;font:15px/1.55 -apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;-webkit-font-smoothing:antialiased;padding:26px 18px 60px}
  .wrap{max-width:1080px;margin:0 auto}
  code,.mono{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}
  .top{display:flex;align-items:center;gap:11px;margin-bottom:22px}
  .top .r{width:32px;height:32px;border-radius:9px;background:linear-gradient(135deg,#6366f1,#7c3aed);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:16px}
  .top h1{font-size:19px;font-weight:700;color:#111827}
  .top .tag{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#b45309;background:#fef3c7;border:1px solid #fde68a;border-radius:6px;padding:3px 8px}
  .top .right{margin-left:auto;display:flex;align-items:center;gap:7px;color:#6b7280;font-size:12.5px;font-weight:500;background:#fff;border:1px solid #e5e7eb;border-radius:20px;padding:5px 12px}
  .top .dot{width:7px;height:7px;border-radius:50%;background:#10b981}
  .top button{background:#fff;border:1px solid #d1d5db;border-radius:8px;font:inherit;font-size:12.5px;font-weight:600;color:#374151;padding:7px 12px;cursor:pointer;margin-left:9px}
  .top button:hover{border-color:#9ca3af}

  .kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:16px}
  @media(max-width:760px){.kpis{grid-template-columns:repeat(2,1fr)}}
  .kpi{background:#fff;border:1px solid #e9ebf0;border-radius:14px;padding:16px 17px;box-shadow:0 1px 2px rgba(16,24,40,.04)}
  .kpi .l{font-size:10.5px;text-transform:uppercase;letter-spacing:.07em;color:#8a93a3;font-weight:700;margin-bottom:9px}
  .kpi .v{font-size:27px;font-weight:700;color:#111827;line-height:1}
  .kpi .v.green{color:#059669}.kpi .v.amber{color:#d97706}
  .kpi .s{font-size:11.5px;color:#9ca3af;margin-top:5px}

  .grid{display:grid;grid-template-columns:1.7fr 1fr;gap:16px;align-items:start}
  @media(max-width:860px){.grid{grid-template-columns:1fr}}
  .card{background:#fff;border:1px solid #e9ebf0;border-radius:14px;padding:18px 19px;box-shadow:0 1px 2px rgba(16,24,40,.04)}
  .card .h{display:flex;align-items:center;margin-bottom:13px}
  .card .h .t{font-size:13px;font-weight:700;color:#111827}
  .card .h .c{margin-left:auto;font-size:11.5px;color:#9ca3af}
  .tbl{width:100%;border-collapse:collapse;font-size:13px}
  .tbl th{text-align:left;font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:#9ca3af;font-weight:700;padding:0 8px 9px}
  .tbl td{padding:9px 8px;border-top:1px solid #f1f3f5;color:#374151;vertical-align:middle}
  .tbl td.num{text-align:right;font-variant-numeric:tabular-nums;font-weight:600;color:#111827}
  .tbl .email{font-family:ui-monospace,monospace;font-size:12px;color:#4338ca;max-width:260px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .pill{display:inline-block;font-size:10.5px;font-weight:700;border-radius:20px;padding:2px 9px}
  .pill.active{background:#ecfdf5;color:#059669}.pill.other{background:#eef2f7;color:#64748b}
  .stat-row{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-top:1px solid #f1f3f5;font-size:13px}
  .stat-row:first-child{border-top:0}
  .stat-row .k{color:#6b7280}.stat-row .v{font-weight:700;color:#111827;font-variant-numeric:tabular-nums}
  .tele{font-size:12px;color:#6b7280;font-family:ui-monospace,monospace;padding:6px 0;border-top:1px solid #f6f7f9;display:flex;gap:8px}
  .tele:first-child{border-top:0}
  .tele .ok{color:#059669}.tele .bad{color:#dc2626}.tele .t{margin-left:auto;color:#9ca3af}
  .muted{color:#6b7280;font-size:13.5px}
  .err{background:#fef3f2;border:1px solid #fecdca;color:#b42318;border-radius:12px;padding:16px 18px;font-size:13.5px}
  .err b{color:#7a271a}
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <div class="r">R</div><h1>RailCall</h1><span class="tag">Admin</span>
    <span class="right"><span class="dot"></span><span id="conn">live</span></span>
    <button onclick="load()">Refresh</button>
  </div>
  <div id="err" class="err" style="display:none"></div>
  <div id="body" style="display:none">
    <div class="kpis">
      <div class="kpi"><div class="l">Consumers</div><div id="k-consumers" class="v">—</div><div class="s">accounts on the ledger</div></div>
      <div class="kpi"><div class="l">Runs metered</div><div id="k-runs" class="v">—</div><div class="s">total runs_used (server-side)</div></div>
      <div class="kpi"><div class="l">Est. revenue</div><div id="k-rev" class="v green">—</div><div class="s">flows × $0.01</div></div>
      <div class="kpi"><div class="l">Groq cascade</div><div id="k-groq" class="v">—</div><div class="s">reachability probe</div></div>
    </div>
    <div class="grid">
      <div class="card">
        <div class="h"><span class="t">Top accounts</span><span class="c" id="users-c">top 10 by ledger</span></div>
        <table class="tbl">
          <thead><tr><th>Email</th><th style="text-align:right">Remaining</th><th style="text-align:right">Used</th></tr></thead>
          <tbody id="users-body"><tr><td colspan="3" class="muted">—</td></tr></tbody>
        </table>
      </div>
      <div class="card" style="display:flex;flex-direction:column;gap:18px">
        <div>
          <div class="h"><span class="t">Accounts by status</span></div>
          <div id="status-body"><div class="muted">—</div></div>
        </div>
        <div>
          <div class="h"><span class="t">Recent activity</span><span class="c">usage ledger</span></div>
          <div id="tele-body"><div class="muted">—</div></div>
        </div>
      </div>
    </div>
  </div>
</div>
<script>
(function(){
  function n(x){return (Number(x)||0).toLocaleString("en-US");}
  function esc(s){return (""+(s==null?"":s)).replace(/[&<>"]/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[c];});}
  function el(id){return document.getElementById(id);}

  function render(d){
    var m=d.metering||{}, users=d.users||[], tele=d.telemetry||[];
    el("k-consumers").textContent=n(m.consumers);
    el("k-runs").textContent=n(m.total_runs_used);
    el("k-rev").textContent="$"+(Number(m.est_revenue)||0).toFixed(2);
    var g=d.groq_status||"—"; var gk=el("k-groq"); gk.textContent=g; gk.className="v"+(/online/i.test(g)?" green":" amber");
    // users
    var ub=el("users-body");
    ub.innerHTML = users.length ? users.map(function(u){
      return '<tr><td class="email">'+esc(u.email)+'</td><td class="num">'+n(u.runs)+'</td><td class="num">'+n(u.used)+'</td></tr>';
    }).join("") : '<tr><td colspan="3" class="muted">No accounts yet.</td></tr>';
    // by status
    var bs=m.by_status||{}, keys=Object.keys(bs);
    el("status-body").innerHTML = keys.length ? keys.map(function(k){
      return '<div class="stat-row"><span class="k"><span class="pill '+(k==="active"?"active":"other")+'">'+esc(k)+'</span></span><span class="v">'+n(bs[k])+'</span></div>';
    }).join("") : '<div class="muted">No data.</div>';
    // telemetry
    el("tele-body").innerHTML = tele.length ? tele.slice().reverse().map(function(t){
      var res=(t.result||t.status||"").toString();
      var cls=/ok|success|executed|approved/i.test(res)?"ok":(/block|fail|error/i.test(res)?"bad":"");
      return '<div class="tele"><span class="'+cls+'">'+esc(t.run_type||t.type||"run")+'</span><span>'+esc(res||"·")+'</span><span class="t">'+esc((t.ran_at||"").toString().slice(11,19))+'</span></div>';
    }).join("") : '<div class="muted">No flows logged yet.</div>';
    el("body").style.display="block"; el("err").style.display="none";
  }

  function load(){
    el("conn").textContent="loading…";
    fetch("/api/dashboard_data",{headers:{"Accept":"application/json"}})
      .then(function(r){ if(r.status===404) throw new Error("404"); return r.json(); })
      .then(function(d){ render(d); el("conn").textContent="live"; })
      .catch(function(e){
        el("body").style.display="none";
        el("err").style.display="block";
        el("err").innerHTML = (e&&e.message==="404")
          ? "<b>Admin is gated off here.</b> This dashboard reads <code>/api/dashboard_data</code>, which only responds when the gateway runs with <code>RAILCALL_LOCAL_ADMIN=1</code> (local or a protected admin instance) — never in public production, since it lists every consumer."
          : "<b>Couldn't load admin data.</b> "+esc(e&&e.message?e.message:e);
        el("conn").textContent="offline";
      });
  }
  window.load=load;
  load();
})();
</script>
</body>
</html>
